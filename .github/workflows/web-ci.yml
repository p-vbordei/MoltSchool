name: web-ci
on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web-ci.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Unit tests
        working-directory: web
        run: npm test
      - name: Build
        working-directory: web
        env:
          NEXTAUTH_SECRET: ci-insecure-secret-do-not-use-in-prod
          KINDRED_BACKEND_URL: http://localhost:8000
        run: npm run build
