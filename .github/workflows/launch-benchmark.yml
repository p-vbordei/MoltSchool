name: launch-benchmark

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "backend/**"
      - "scripts/onboarding_benchmark.sh"
      - ".github/workflows/launch-benchmark.yml"

jobs:
  onboarding:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kindred
          POSTGRES_PASSWORD: kindred
          POSTGRES_DB: kindred
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U kindred"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      KINDRED_BACKEND_URL: http://127.0.0.1:8000
      KINDRED_DATABASE_URL: postgresql://kindred:kindred@127.0.0.1:5432/kindred
      KINDRED_OBJECT_STORE_ENDPOINT: postgres
      KINDRED_SEED_KEYFILE: /tmp/kin-seed.key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pipx install uv

      - name: Generate facilitator signing key
        run: |
          echo "KINDRED_FACILITATOR_SIGNING_KEY_HEX=$(python3 -c 'import secrets;print(secrets.token_hex(32))')" >> "$GITHUB_ENV"

      - name: Install backend deps
        working-directory: backend
        run: uv sync

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          nohup uv run uvicorn kindred.api.main:app --host 127.0.0.1 --port 8000 \
              > /tmp/backend.log 2>&1 &
          for i in {1..30}; do
              curl -sf http://127.0.0.1:8000/healthz && break
              sleep 1
          done

      - name: Seed grimoires
        run: backend/.venv/bin/python scripts/seed_grimoires.py

      - name: Mint benchmark invite
        run: |
          INVITE=$(backend/.venv/bin/python scripts/mint_invite.py --slug claude-code-patterns)
          echo "BENCH_INVITE=$INVITE" >> "$GITHUB_ENV"

      - name: Run onboarding benchmark
        run: ./scripts/onboarding_benchmark.sh --slug claude-code-patterns --invite "$BENCH_INVITE"

      - name: Backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true
